<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feelink — Check-in</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .emoji-row {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            gap: 8px;
        }

        .emoji-btn {
            flex: 1;
            font-size: 32px;
            padding: 12px 0;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.15s;
        }

        .emoji-btn:hover {
            border-color: #6c63ff;
            transform: scale(1.08);
        }

        .emoji-btn.odabran {
            border-color: #6c63ff;
            background: #ede9fe;
            transform: scale(1.08);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        .brojac {
            text-align: right;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }

        .streak {
            text-align: center;
            background: #ede9fe;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #6c63ff;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="kartica">
        <h1>Kako si danas? 🌿</h1>
        <p class="podnaslov">Odaberi emoji koji opisuje tvoje raspoloženje</p>

        <div class="streak" id="streak">🔥 3 uzastopna dana</div>

        <div class="emoji-row">
            <button class="emoji-btn" onclick="odaberiEmoji(this, 1)" title="Loše">😞</button>
            <button class="emoji-btn" onclick="odaberiEmoji(this, 2)" title="Nije sjajno">😕</button>
            <button class="emoji-btn" onclick="odaberiEmoji(this, 3)" title="OK">😐</button>
            <button class="emoji-btn" onclick="odaberiEmoji(this, 4)" title="Dobro">🙂</button>
            <button class="emoji-btn" onclick="odaberiEmoji(this, 5)" title="Odlično">😄</button>
        </div>

        <div class="poruka-greska" id="greska"></div>
        <div class="poruka-uspjeh" id="uspjeh"></div>

        <div class="form-group">
            <label for="biljeska">Bilješka (nije obavezno)</label>
            <textarea id="biljeska" placeholder="Kako se osjećaš? Što se dogodilo danas?" maxlength="280" oninput="azurirajBrojac()"></textarea>
            <div class="brojac"><span id="brojac">0</span>/280</div>
        </div>

        <button class="btn-primary" onclick="spremi()">Spremi ✓</button>
    </div>

    <script src="../offline/cache.js"></script>
    <script>
        let odabranaVrijednost = null;

        function odaberiEmoji(gumb, vrijednost) {
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('odabran'));
            gumb.classList.add('odabran');
            odabranaVrijednost = vrijednost;
        }

        function azurirajBrojac() {
            const tekst = document.getElementById('biljeska').value;
            document.getElementById('brojac').textContent = tekst.length;
        }

        function spremi() {
            const greska = document.getElementById('greska');
            const uspjeh = document.getElementById('uspjeh');
            greska.style.display = 'none';
            uspjeh.style.display = 'none';

            if (!odabranaVrijednost) {
                greska.textContent = 'Odaberi kako se osjećaš';
                greska.style.display = 'block';
                return;
            }

            const biljeska = document.getElementById('biljeska').value;
            const unos = {
                emoji_vrijednost: odabranaVrijednost,
                biljeska: biljeska,
                datum: new Date().toISOString()
            };

            const podaci = new FormData();
            podaci.append('emoji_vrijednost', odabranaVrijednost);
            podaci.append('biljeska', biljeska);

            fetch('../backend/checkin.php', {
                method: 'POST',
                body: podaci
            })
            .then(r => r.json())
            .then(data => {
                if (data.uspjeh) {
                    uspjeh.textContent = 'Zabilježeno! ✓';
                    uspjeh.style.display = 'block';
                    document.getElementById('biljeska').value = '';
                    document.getElementById('brojac').textContent = '0';
                    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('odabran'));
                    odabranaVrijednost = null;
                } else {
                    // offline fallback
                    spremiOffline(unos);
                    uspjeh.textContent = 'Sačuvano lokalno — sinkronizacija čeka internet ☁️';
                    uspjeh.style.display = 'block';
                }
            })
            .catch(() => {
                spremiOffline(unos);
                uspjeh.textContent = 'Sačuvano lokalno — sinkronizacija čeka internet ☁️';
                uspjeh.style.display = 'block';
            });
        }
    </script>
</body>
</html>
