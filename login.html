<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feelink — Prijava</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kartica">
        <h1>Dobro jutro 🌤️</h1>
        <p class="podnaslov">Prijavi se i nastavi pratiti raspoloženje</p>

        <div class="poruka-greska" id="greska"></div>

        <div class="form-group">
            <label for="email">Email adresa</label>
            <input type="email" id="email" placeholder="ime@email.com">
        </div>

        <div class="form-group">
            <label for="lozinka">Lozinka</label>
            <input type="password" id="lozinka" placeholder="Tvoja lozinka">
        </div>

        <button class="btn-primary" onclick="prijava()">Prijavi se</button>

        <div class="link-text">
            Nemaš račun? <a href="register.html">Registriraj se</a>
        </div>
    </div>

    <script>
        function prijava() {
            const email = document.getElementById('email').value.trim();
            const lozinka = document.getElementById('lozinka').value;
            const greska = document.getElementById('greska');

            greska.style.display = 'none';

            if (!email || !lozinka) {
                greska.textContent = 'Molimo ispunite sva polja';
                greska.style.display = 'block';
                return;
            }

            const podaci = new FormData();
            podaci.append('email', email);
            podaci.append('lozinka', lozinka);

            fetch('../backend/login.php', {
                method: 'POST',
                body: podaci
            })
            .then(r => r.json())
            .then(data => {
                if (data.uspjeh) {
                    window.location.href = 'checkin.html';
                } else {
                    greska.textContent = data.greska;
                    greska.style.display = 'block';
                }
            })
            .catch(() => {
                greska.textContent = 'Greška pri povezivanju sa serverom';
                greska.style.display = 'block';
            });
        }
    </script>
</body>
</html>
