<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feelink – Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="checkin.css" />
</head>
<body>

<header class="topbar">
  <div class="logo">
    <img src="img/logo-icon.svg" alt="Feelink logo" class="logo-icon" />
    <span class="logo-text">Feelink</span>
  </div>
  <a href="login.html" class="logout-btn">Odjava</a>
</header>

<main class="main">

  <div class="steps">
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step active"></div>
  </div>

  <h2 class="screen-title">Sve je<br/><em>spremno!</em></h2>
  <p class="screen-sub">Potvrdi svoj dnevni unos raspoloženja.</p>

  <div class="summary-card">
    <div class="summary-row">
      <span class="summary-label">Raspoloženje</span>
      <span class="summary-value">odabrano ✓</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Datum</span>
      <span class="summary-value">danas</span>
    </div>
  </div>

  <div class="btn-row">
    <a href="checkin-2.html" class="btn btn-ghost">← Nazad</a>
    <a href="checkin-done.html" class="btn btn-success">Spremi unos ✓</a>
  </div>

</main>
</body>
</html>
