<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feelink – Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="checkin.css" />
</head>
<body>

<header class="topbar">
  <div class="logo">
    <img src="img/logo-icon.svg" alt="Feelink logo" class="logo-icon" />
    <span class="logo-text">Feelink</span>
  </div>
  <a href="login.html" class="logout-btn">Odjava</a>
</header>

<main class="main">

  <div class="steps">
    <div class="step active"></div>
    <div class="step"></div>
    <div class="step"></div>
  </div>

  <h2 class="screen-title">Kako se osjećaš<br/><em>danas?</em></h2>
  <p class="screen-sub">Odaberi raspoloženje – brzo i jednostavno.</p>

  <div class="emoji-grid">
    <a href="checkin-2.html" class="emoji-btn">
      <span class="emoji-face">😞</span>
      <span class="emoji-label">Loše</span>
    </a>
    <a href="checkin-2.html" class="emoji-btn">
      <span class="emoji-face">😴</span>
      <span class="emoji-label">Umorno</span>
    </a>
    <a href="checkin-2.html" class="emoji-btn">
      <span class="emoji-face">😐</span>
      <span class="emoji-label">Neutralno</span>
    </a>
    <a href="checkin-2.html" class="emoji-btn">
      <span class="emoji-face">🙂</span>
      <span class="emoji-label">Dobro</span>
    </a>
    <a href="checkin-2.html" class="emoji-btn">
      <span class="emoji-face">😄</span>
      <span class="emoji-label">Odlično</span>
    </a>
  </div>

</main>
</body>
</html>
