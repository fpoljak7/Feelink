<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feelink — Registracija</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kartica">
        <h1>Dobrodošli 👋</h1>
        <p class="podnaslov">Kreirajte račun i počnite pratiti raspoloženje</p>

        <div class="poruka-greska" id="greska"></div>
        <div class="poruka-uspjeh" id="uspjeh"></div>

        <div class="form-group">
            <label for="email">Email adresa</label>
            <input type="email" id="email" placeholder="ime@email.com">
        </div>

        <div class="form-group">
            <label for="lozinka">Lozinka</label>
            <input type="password" id="lozinka" placeholder="Minimalno 8 znakova">
        </div>

        <div class="form-group">
            <label for="potvrda">Potvrdi lozinku</label>
            <input type="password" id="potvrda" placeholder="Ponovi lozinku">
        </div>

        <button class="btn-primary" onclick="registracija()">Kreiraj račun</button>

        <div class="link-text">
            Već imaš račun? <a href="login.html">Prijavi se</a>
        </div>
    </div>

    <script>
        function registracija() {
            const email = document.getElementById('email').value.trim();
            const lozinka = document.getElementById('lozinka').value;
            const potvrda = document.getElementById('potvrda').value;
            const greska = document.getElementById('greska');
            const uspjeh = document.getElementById('uspjeh');

            greska.style.display = 'none';
            uspjeh.style.display = 'none';

            if (!email || !lozinka || !potvrda) {
                greska.textContent = 'Molimo ispunite sva polja';
                greska.style.display = 'block';
                return;
            }

            if (lozinka.length < 8) {
                greska.textContent = 'Lozinka mora imati najmanje 8 znakova';
                greska.style.display = 'block';
                return;
            }

            if (lozinka !== potvrda) {
                greska.textContent = 'Lozinke se ne podudaraju';
                greska.style.display = 'block';
                return;
            }

            const podaci = new FormData();
            podaci.append('email', email);
            podaci.append('lozinka', lozinka);

            fetch('/feelink/backend/register.php', {
                method: 'POST',
                body: podaci
            })
            .then(r => r.json())
            .then(data => {
                if (data.uspjeh) {
                    uspjeh.textContent = 'Registracija uspješna! Preusmjeravamo te...';
                    uspjeh.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    greska.textContent = data.greska;
                    greska.style.display = 'block';
                }
            })
            .catch(() => {
                greska.textContent = 'Greška pri povezivanju sa serverom';
                greska.style.display = 'block';
            });
        }
    </script>
</body>
</html>
